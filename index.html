<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Garden Sim</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; }
        .game-font { font-family: 'Fredoka One', cursive; }
        .plot-inner { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .plot-inner:hover { transform: scale(1.02); }
        .dirt { background: #5d4037; box-shadow: inset 0 4px 10px rgba(0,0,0,0.3); }
        .grass { background: #81c784; box-shadow: 0 4px 0 #4caf50; }
        @keyframes grow { from { transform: scale(0.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-grow { animation: grow 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-sky-50 min-h-screen p-4 md:p-8">

    <!-- Top Bar -->
    <div class="max-w-4xl mx-auto flex justify-between items-center bg-white/80 backdrop-blur-md p-4 rounded-3xl shadow-xl border-2 border-white mb-8">
        <div id="money" class="game-font text-3xl text-yellow-600 drop-shadow-sm">💰 $25</div>
        <div class="flex gap-3">
            <div id="sprinklers" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-2xl font-bold text-sm">💧 0 Sprinklers</div>
            <div id="plots-count" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-2xl font-bold text-sm">🌻 4 Plots</div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Seed Shop -->
        <div class="lg:col-span-1 space-y-4">
            <h2 class="game-font text-2xl text-green-800 text-center lg:text-left">Seed Shop</h2>
            <div id="shop" class="grid grid-cols-2 lg:grid-cols-1 gap-3"></div>
            
            <div class="pt-6 mt-6 border-t-2 border-green-100 space-y-3">
                <button onclick="buyPlot()" class="w-full bg-gradient-to-b from-orange-400 to-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg active:translate-y-1 transition-all">
                    + New Plot <span id="plot-cost" class="block text-xs opacity-80">$500</span>
                </button>
                <button onclick="buySprinkler()" class="w-full bg-gradient-to-b from-blue-400 to-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:translate-y-1 transition-all">
                    + Sprinkler <span id="sprinkler-cost" class="block text-xs opacity-80">$1000</span>
                </button>
            </div>
        </div>

        <!-- The Garden -->
        <div class="lg:col-span-3">
            <div id="garden" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        const PLANTS = {
            daisy: { name: 'Daisy', cost: 10, sell: 25, icon: '🌼', speed: 4 },
            tulip: { name: 'Tulip', cost: 50, sell: 140, icon: '🌷', speed: 2 },
            sunflower: { name: 'Sunflower', cost: 200, sell: 600, icon: '🌻', speed: 1 },
            rose: { name: 'Rose', cost: 1000, sell: 3500, icon: '🌹', speed: 0.5 }
        };

        let money = 25;
        let plots = Array(4).fill(null);
        let selectedSeed = 'daisy';
        let sprinklers = 0;

        function render() {
            // Update Stats
            document.getElementById('money').innerText = `💰 $${money.toLocaleString()}`;
            document.getElementById('sprinklers').innerText = `💧 ${sprinklers} Sprinklers`;
            document.getElementById('plots-count').innerText = `🌻 ${plots.length} Plots`;
            document.getElementById('plot-cost').innerText = `$${plots.length * 250}`;
            document.getElementById('sprinkler-cost').innerText = `$${(sprinklers + 1) * 1000}`;

            // Render Shop
            const shopEl = document.getElementById('shop');
            shopEl.innerHTML = '';
            Object.entries(PLANTS).forEach(([id, p]) => {
                const isSelected = selectedSeed === id;
                const canAfford = money >= p.cost;
                shopEl.innerHTML += `
                    <div onclick="selectedSeed='${id}'; render()" 
                         class="cursor-pointer p-4 rounded-3xl border-4 transition-all flex flex-col items-center
                         ${isSelected ? 'border-green-500 bg-green-100 scale-105' : 'border-white bg-white hover:border-green-200'}">
                        <span class="text-4xl mb-2">${p.icon}</span>
                        <span class="font-bold text-gray-800">${p.name}</span>
                        <span class="text-xs font-bold ${canAfford ? 'text-green-600' : 'text-red-400'}">$${p.cost}</span>
                    </div>`;
            });

            // Render Garden
            const gardenEl = document.getElementById('garden');
            gardenEl.innerHTML = '';
            plots.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `aspect-square rounded-[2.5rem] p-4 plot-inner border-8 border-white shadow-2xl relative overflow-hidden flex items-center justify-center ${!p ? 'dirt' : 'grass'}`;
                
                if (!p) {
                    div.onclick = () => plant(i);
                    div.innerHTML = '<span class="game-font text-white/20 text-xl pointer-events-none">PLANT</span>';
                } else {
                    const isReady = p.progress >= 100;
                    const scale = 0.3 + (p.progress / 100) * 0.7;
                    div.innerHTML = `
                        <div class="flex flex-col items-center animate-grow">
                            <span class="text-6xl mb-2" style="transform: scale(${scale})">${p.icon}</span>
                            ${isReady ? 
                                `<button onclick="harvest(${i})" class="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-xl font-black text-xs shadow-lg animate-bounce uppercase">Harvest $${p.sell}</button>` : 
                                `<div class="w-20 bg-black/10 h-2 rounded-full overflow-hidden border border-white/20">
                                    <div class="bg-white h-full transition-all" style="width: ${p.progress}%"></div>
                                </div>`
                            }
                        </div>`;
                }
                gardenEl.appendChild(div);
            });
        }

        function plant(i) {
            const seed = PLANTS[selectedSeed];
            if (money >= seed.cost && !plots[i]) {
                money -= seed.cost;
                plots[i] = { ...seed, progress: 0 };
                render();
            }
        }

        function harvest(i) {
            money += plots[i].sell;
            plots[i] = null;
            render();
        }

        function buyPlot() {
            const cost = plots.length * 250;
            if (money >= cost) {
                money -= cost;
                plots.push(null);
                render();
            }
        }

        function buySprinkler() {
            const cost = (sprinklers + 1) * 1000;
            if (money >= cost) {
                money -= cost;
                sprinklers++;
                render();
            }
        }

        // Growth Loop
        setInterval(() => {
            let changed = false;
            plots.forEach(p => {
                if (p && p.progress < 100) {
                    const boost = 1 + (sprinklers * 0.5);
                    p.progress = Math.min(100, p.progress + (p.speed * boost));
                    changed = true;
                }
            });
            if (changed) render();
        }, 800);

        render();
    </script>
</body>
</html>
